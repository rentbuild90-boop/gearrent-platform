<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GearRent - Live Tracking</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

                    "status-pending": "#F59E0B",
                    "outline-variant": "#c7c4d8",
                    "surface-background": "#F9FAFB",
                    "secondary": "#712ae2",
                    "on-secondary": "#ffffff",
                    "status-error": "#EF4444",
                    "surface": "#fcf8ff",
                    "primary-fixed-dim": "#c3c0ff",
                    "on-tertiary-container": "#ffd2be",
                    "status-available": "#10B981",
                    "neutral-text-main": "#111827",
                    "secondary-fixed": "#eaddff",
                    "secondary-container": "#8a4cfc",
                    "on-primary-fixed-variant": "#3323cc",
                    "primary": "#3525cd",
                    "surface-container-highest": "#e4e1ee",
                    "tertiary-container": "#a44100",
                    "background": "#fcf8ff",
                    "on-primary-fixed": "#0f0069",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#f0ecf9",
                    "primary-container": "#4f46e5",
                    "primary-fixed": "#e2dfff",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "on-surface": "#1b1b24",
                    "inverse-on-surface": "#f3effc",
                    "on-secondary-fixed": "#25005a",
                    "on-primary-container": "#dad7ff",
                    "inverse-surface": "#302f39",
                    "surface-tint": "#4d44e3",
                    "status-booked": "#3B82F6",
                    "surface-container-high": "#eae6f4",
                    "tertiary-fixed": "#ffdbcc",
                    "surface-card": "#FFFFFF",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "error": "#ba1a1a",
                    "on-background": "#1b1b24",
                    "surface-bright": "#fcf8ff",
                    "on-primary": "#ffffff",
                    "outline": "#777587",
                    "on-secondary-container": "#fffbff",
                    "on-tertiary-fixed": "#351000"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "24px",
                    "unit": "4px",
                    "margin-mobile": "16px",
                    "container-max": "1280px",
                    "margin-desktop": "32px",
                    "stack-sm": "8px",
                    "stack-md": "16px",
                    "stack-lg": "24px"
            },
            "fontFamily": {
                    "h1": ["Plus Jakarta Sans"],
                    "h2": ["Plus Jakarta Sans"],
                    "label-md": ["Inter"],
                    "body-md": ["Inter"],
                    "h3": ["Plus Jakarta Sans"],
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "h1": ["36px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "h2": ["30px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "h3": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}]

          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-background text-on-surface font-body-md text-body-md h-screen w-full overflow-hidden flex flex-col antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full h-16 z-40 bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 shadow-sm flex items-center justify-between px-4 w-full">
<span class="material-symbols-outlined text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-full p-2 cursor-pointer active:opacity-70 transition-colors" data-icon="menu">menu</span>
<div class="text-indigo-600 dark:text-indigo-400 font-black tracking-tighter text-xl font-['Plus_Jakarta_Sans']">GearRent</div>
<span class="material-symbols-outlined text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-full p-2 cursor-pointer active:opacity-70 transition-colors" data-icon="notifications">notifications</span>
</header>
<!-- Map Canvas Area -->
<main class="relative flex-1 w-full h-full pt-16 bg-surface-variant z-0">
<!-- Map Background -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center" data-alt="high contrast digital map view of urban city streets showing a calculated delivery route with soft light terrain and clear distinct road arteries" data-location="Downtown Industrial Park Route, Chicago" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBExkzv0KfXuAoKxii5yzh2rcOoAA90yw1QWEGFumOnIl2Qlr41tMe0bxPGKQWtFor1IVWVn6Sd6kiRnYe7he_Vtztl4NPvP8N0BbjTpufkcuA8N81J8q6Nzy8nCUaGBgyTw9Mw65YgrsNPv1Q5XO_pht4CKhRqKCp5_vfZQ3VSNiK61Z58D86WiLgd0qgCKmybaicu4rCfMQHBfsOi6w_oCI8sFeJAqduGkjzsCKjZUs1lrUmKdDWbHyJxXkTg7rbJGQMQkiI6pxg');">
</div>
<!-- Simulated Route Overlay & Active Marker -->
<div class="absolute top-1/3 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center z-10">
<div class="relative">
<!-- Pulse Effect -->
<div class="absolute inset-0 bg-primary rounded-full animate-ping opacity-30"></div>
<!-- Marker -->
<div class="bg-primary text-on-primary p-3 rounded-full shadow-[0_4px_12px_rgba(53,37,205,0.4)] border-2 border-surface-container-lowest relative z-10 flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" data-icon="local_shipping">local_shipping</span>
</div>
</div>
<!-- Destination Line Indicator -->
<div class="w-1.5 h-24 bg-gradient-to-b from-primary to-transparent opacity-60 rounded-full mt-2"></div>
</div>
<!-- Destination Pin -->
<div class="absolute bottom-[45%] right-[20%] flex flex-col items-center">
<div class="bg-surface-container-lowest text-neutral-text-main p-2 rounded-full shadow-lg border-2 border-outline-variant/30 z-10">
<span class="material-symbols-outlined text-status-available text-[20px]" data-icon="location_on">location_on</span>
</div>
<div class="bg-surface-container-lowest/90 backdrop-blur-sm px-3 py-1 rounded-md shadow-sm mt-2 text-label-sm font-label-sm font-semibold border border-outline-variant/20">
                Worksite Alpha
            </div>
</div>
</main>
<!-- Info Drawer (Bottom Sheet) -->
<div class="absolute bottom-0 w-full bg-surface-container-lowest rounded-t-[32px] shadow-[0_-12px_40px_rgba(0,0,0,0.08)] z-50 flex flex-col border-t border-outline-variant/10">
<div class="p-6 md:p-8 flex flex-col gap-6 max-w-container-max mx-auto w-full">
<!-- Drag Handle -->
<div class="w-14 h-1.5 bg-surface-variant rounded-full mx-auto -mt-2"></div>
<!-- Header: ETA -->
<div class="flex flex-col items-center text-center gap-1.5">
<h1 class="font-h1 text-h1 text-neutral-text-main tracking-tight">12 min</h1>
<div class="flex items-center gap-1.5 bg-status-pending/10 px-3 py-1 rounded-full text-status-pending">
<span class="material-symbols-outlined text-[16px]" data-icon="schedule">schedule</span>
<span class="font-label-md text-label-md">Arriving Soon</span>
</div>
</div>
<!-- Status Indicator (Stepper) -->
<div class="flex items-center justify-between w-full relative px-4 mt-2">
<!-- Connecting Background Line -->
<div class="absolute left-[15%] right-[15%] top-[14px] h-[3px] bg-surface-variant -z-10 rounded-full"></div>
<!-- Active Progress Line -->
<div class="absolute left-[15%] w-[35%] top-[14px] h-[3px] bg-primary -z-10 rounded-full"></div>
<!-- Step 1: Completed -->
<div class="flex flex-col items-center gap-2 w-20">
<div class="w-7 h-7 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-[14px] font-bold" data-icon="check">check</span>
</div>
<span class="font-label-sm text-label-sm text-neutral-text-main text-center">In Transit</span>
</div>
<!-- Step 2: Active -->
<div class="flex flex-col items-center gap-2 w-24">
<div class="w-7 h-7 rounded-full border-[3px] border-primary bg-surface-container-lowest flex items-center justify-center shadow-sm relative">
<div class="w-2.5 h-2.5 rounded-full bg-primary animate-pulse"></div>
</div>
<span class="font-label-sm text-label-sm text-primary font-bold text-center">Near Worksite</span>
</div>
<!-- Step 3: Pending -->
<div class="flex flex-col items-center gap-2 w-20">
<div class="w-7 h-7 rounded-full border-2 border-outline-variant bg-surface-container-lowest flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<span class="font-label-sm text-label-sm text-neutral-text-muted text-center">Arrived</span>
</div>
</div>
<!-- Driver & Vehicle Bento Card -->
<div class="bg-surface-container rounded-xl p-4 flex items-center gap-4 border border-outline-variant/30 mt-2">
<!-- Driver Avatar -->
<div class="w-14 h-14 rounded-full overflow-hidden bg-surface-dim flex-shrink-0 border-2 border-surface-container-lowest shadow-sm">
<img alt="Driver Profile" class="w-full h-full object-cover" data-alt="Professional headshot of a mature male heavy equipment driver wearing a safety vest, slightly smiling in natural daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAzyhu4RimrJea1BCDzhuFNdZyXoTYpbUI1J1wwrjydOgwoVd2QFktUOMlTRli7LvarVWloyO8JpdP5TbEfJ0pQ5qQPunD__yCqOxM7AAvHBRz1OZcwX4AC7rUs30lPG8mnJJWJ2QB5qIGukCExYCuTEl1yJcPCLl28Ec_HuQw7XO8sW8_X04yUY6hhpo2QK7xL8viXxYtfhfw8k8xAS45qMaf1OUnZ4YRXDrOebq8zZvE8u6qH9_etWQnEsMs-GaPGzpEm3fai9W8"/>
</div>
<!-- Details -->
<div class="flex-1 flex flex-col">
<span class="font-label-md text-label-md text-neutral-text-main">Marcus Johnson</span>
<span class="font-body-md text-[14px] text-neutral-text-muted mt-0.5">Caterpillar 320 Excavator</span>
<div class="flex items-center gap-1 mt-1.5 text-status-pending">
<span class="material-symbols-outlined text-[14px]" data-icon="star" data-weight="fill">star</span>
<span class="font-label-sm text-label-sm text-neutral-text-main">4.9 <span class="text-neutral-text-muted font-normal">(120+ deliveries)</span></span>
</div>
</div>
<!-- Vehicle Icon Indicator -->
<div class="w-12 h-12 bg-surface-container-lowest rounded-lg flex items-center justify-center shadow-sm border border-outline-variant/20 flex-shrink-0">
<span class="material-symbols-outlined text-primary text-[24px]" data-icon="construction">construction</span>
</div>
</div>
<!-- Actions -->
<div class="flex gap-4 w-full pb-safe">
<button class="flex-1 bg-gradient-to-r from-primary to-secondary text-on-primary py-4 px-6 rounded-full font-label-md text-label-md flex items-center justify-center gap-2 shadow-[0_4px_14px_rgba(53,37,205,0.25)] hover:shadow-[0_6px_20px_rgba(53,37,205,0.35)] transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]" data-icon="call">call</span>
                    Contact Driver
                </button>
<button class="w-14 flex-shrink-0 bg-surface-container-lowest text-neutral-text-main py-4 px-0 rounded-full font-label-md text-label-md flex items-center justify-center border border-outline hover:bg-surface-container transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-[22px]" data-icon="help">help</span>
</button>
</div>
</div>
</div>
</body></html>
